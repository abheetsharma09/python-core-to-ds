{% extends "base.html" %}
{% block formSignIn %}
{% load socialaccount %}
<!-- ================= CENTRAL CONTENT WRAPPER ================= -->
    <main class="page-wrapper">
        
        <!-- Your exact Form Box (Now perfectly centered!) -->
        <div class="signup-container">
            <!-- Visual Branding Header -->
            <header class="signup-header">
                <div class="logo">✦</div>
                <h1>Get Started</h1>
                <p>Create an account to unlock all features.</p>
            </header>

<!-- ====== Continue with Google ====== -->
<div class="social-login">
    <a href="{% provider_login_url 'google' %}" class="google-btn">
        <svg class="google-icon" viewBox="0 0 48 48" width="24" height="24">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
        </svg>
        <span class="btn-text">Sign in with Google</span>
    </a>
    <div class="divider"><span>or</span></div>
</div>

            <!-- Main Account Registration Form -->
            <form class="signup-form" action="#" method="POST">
                {% csrf_token %}
                <!-- Full Name Field -->
                <div class="input-group">
                    <input type="text" name="name" id="name" required placeholder=" ">
                    <label for="name">First Name</label>
                </div>

                <!-- Last Name Field -->
                <div class="input-group">
                    <input type="text" name="last-name" id="last-name" required placeholder=" ">
                    <label for="last-name">Last Name</label>
                </div>

                <!-- Full Username Field -->
                <div class="input-group">
                    <input type="text" name="username" id="username" required placeholder=" ">
                    <label for="username">Username</label>
                </div>

                <!-- Email Address Field -->
                <div class="input-group">
                    <input type="email" name="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <input type="password" name="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>

                <!-- Password Field Check -->
                <div class="input-group">
                    <input type="password" name="password-check" id="password-check" required placeholder=" ">
                    <label for="password-check">Retype Password</label>
                </div>

                <!-- Terms & Conditions Consent -->
                <div class="terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
                </div>

                <!-- Submission Action -->
                <button type="submit" class="submit-btn">Create Account</button>
                
            </form>

            <!-- Redirect Link to Existing Login Page -->
            <footer class="signup-footer">
                <p>Already have an account? <a href="/logIn">Log In</a></p>
            </footer>
        </div>

    </main>
{% endblock formSignIn %}
