<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubix - Sign Up</title>
    <link rel="stylesheet" href="../static/auth-style.css">
</head>
<body>
    <div class="auth-card-fullscreen">
        <!-- Main Layout Splitter -->
        <main class="auth-container">
            
            <!-- THE FIX: Re-added the missing left-side column container wrapper -->
            <div class="auth-form-column">
                <div class="form-wrapper">
                    <!-- App Branding and Context Header -->
                    <span class="brand-logo"><a href="/">CUBIX</a></span>
                    <h1 class="auth-title">Get started.</h1>
                    <p class="auth-subtitle">Create a free profile to begin organizing your daily flow with teammates.</p>

                    <!-- Form Inputs (Ready for Django {% csrf_token %}) -->
                    <form method="POST" class="main-auth-form">
                        {% csrf_token %}
                        <div class="input-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Choose a username" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Create a secure password" required>
                        </div>

                        <!-- Call to Action Trigger -->
                        <button type="submit"  class="btn-submit">CREATE ACCOUNT</button>
                    </form>

                    <!-- Clean Horizontal Divider Line -->
                    <div class="auth-divider">
                        <span>or</span>
                    </div>
                    {% load socialaccount %}
                    <!-- Continue with Google Link Styled as a Button -->
                    <a href="{% provider_login_url 'google' %}" class="btn-google">
                        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://w3.org">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </a>

                    <!-- Cross-navigation pathway link -->
                    <p class="switch-auth-msg" style="margin-top: 25px;">Already have an account? <a href="/login/">Log in here</a></p>
                </div>
            </div> <!-- End of Left-Side Column wrapper -->

            <!-- Right Side: Geometric Mosaic Aesthetic Accent -->
            <div class="auth-graphics-column">
                <div class="mosaic-grid">
                    <div class="shape quarter-top-left navy"></div>
                    <div class="shape quarter-top-right light-blue"></div>
                    <div class="shape circle beige"></div>
                    <div class="shape quarter-bottom-left pink"></div>
                    <div class="shape circle beige"></div>
                    <div class="shape semi-circle-left coral"></div>
                    <div class="shape quarter-top-left light-blue"></div>
                    <div class="shape quarter-bottom-right dark-green"></div>
                    <div class="shape quarter-top-right pink"></div>
                    <div class="shape empty"></div>
                    <div class="shape circle navy"></div>
                    <div class="shape quarter-top-left beige"></div>
                </div>
            </div>
            
        </main>
    </div>
</body>
</html>
